<h1>Os Meus Projetos</h1>
<ul>
    {% for projeto in projetos %}
        <li>
            <strong>{{ projeto.titulo }}</strong> - {{ projeto.ano }}
            <p>{{ projeto.descricao }}</p>
            </li>
    {% empty %}
        <li>Ainda não há projetos registados.</li>
    {% endfor %}
</ul>
<a href="{% url 'portfolio:home' %}">Voltar</a>
